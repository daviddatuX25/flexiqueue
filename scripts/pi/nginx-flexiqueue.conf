# Nginx site for FlexiQueue on Orange Pi (PHP 8.3)
# Copy to the Pi and install:
#   scp scripts/pi/nginx-flexiqueue.conf root@<pi-ip>:/tmp/flexiqueue
#   ssh root@<pi-ip> "sudo mv /tmp/flexiqueue /etc/nginx/sites-available/flexiqueue && sudo ln -sf /etc/nginx/sites-available/flexiqueue /etc/nginx/sites-enabled/ && sudo rm -f /etc/nginx/sites-enabled/default && sudo nginx -t && sudo systemctl reload nginx"
# For PHP 8.2, replace php8.3-fpm.sock with php8.2-fpm.sock below.

server {
    listen 80;
    server_name _;
    root /var/www/flexiqueue/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # WebSocket: Laravel Reverb
    location /app {
        proxy_pass http://127.0.0.1:6001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location ~ /\.(?!well-known).* { deny all; }
}
