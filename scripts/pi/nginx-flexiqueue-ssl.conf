# Nginx site for FlexiQueue on Orange Pi (PHP 8.3) with HTTPS
# Use this when you need camera access on mobile (secure context).
# Requires SSL certs in /etc/nginx/ssl/ (see scripts/pi/README.md "HTTPS on the Pi").
# For PHP 8.2, replace php8.3-fpm.sock with php8.2-fpm.sock.

server {
    listen 80;
    server_name flexiqueue.edge;
    # Redirect HTTP to HTTPS so mobile always gets secure context
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name flexiqueue.edge;
    root /var/www/flexiqueue/public;
    index index.php;

    ssl_certificate     /etc/nginx/ssl/flexiqueue.crt;
    ssl_certificate_key /etc/nginx/ssl/flexiqueue.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    add_header Permissions-Policy "camera=(self)";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location /app {
        proxy_pass http://127.0.0.1:6001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location ~ /\.(?!well-known).* { deny all; }
}
