# Build FlexiQueue as a full deploy artifact for Orange Pi.
# Branch strategy: dev = build only; master = build + deploy (if ENABLE_PI_DEPLOY=1).
# See docs/architecture/10-DEPLOYMENT.md §6.

name: Build for Orange Pi

on:
  push:
    branches:
      - dev
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, mysql
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies and build
        run: npm ci && npm run build

      - name: Create full deploy tarball
        run: |
          tar -czf flexiqueue-deploy.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='storage' \
            --exclude='.phpunit.cache' \
            --exclude='.github' \
            --exclude='tests' \
            --exclude='playwright-report' \
            --exclude='.cursor' \
            .

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: flexiqueue-deploy
          path: flexiqueue-deploy.tar.gz

  # Deploy runs only from master (prod). Set repo variable ENABLE_PI_DEPLOY=1 and secrets PI_HOST, PI_USER, PI_SSH_KEY.
  deploy:
    needs: build
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && vars.ENABLE_PI_DEPLOY == '1'
    runs-on: ubuntu-latest
    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: flexiqueue-deploy

      - name: Deploy to Orange Pi
        env:
          PI_HOST: ${{ secrets.PI_HOST }}
          PI_USER: ${{ secrets.PI_USER }}
          SSH_KEY: ${{ secrets.PI_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > deploy_key && chmod 600 deploy_key
          TARBALL="flexiqueue-deploy/flexiqueue-deploy.tar.gz"
          scp -o StrictHostKeyChecking=no -i deploy_key "$TARBALL" "${PI_USER}@${PI_HOST}:/tmp/flexiqueue-deploy.tar.gz"
          ssh -o StrictHostKeyChecking=no -i deploy_key "${PI_USER}@${PI_HOST}" \
            'cd /var/www/flexiqueue && sudo tar -xzf /tmp/flexiqueue-deploy.tar.gz && sudo chown -R www-data:www-data . && php artisan migrate --force && php artisan config:cache && php artisan route:cache'
          rm -f deploy_key
        # If Reverb runs as systemd, add: && sudo systemctl restart flexiqueue-reverb
