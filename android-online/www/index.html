<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlexiQueue</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f172a;
      color: #e2e8f0;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { margin-top: 24px; font-size: 20px; font-weight: 600; }
    p { margin-top: 8px; font-size: 14px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h1>Connecting...</h1>
  <p>FlexiQueue requires an internet connection.</p>
  <script type="module" src="js/back-button.js"></script>
</body>
</html>
